name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cider-${{ matrix.target }}.tar.gz cider
      - uses: actions/upload-artifact@v4
        with:
          name: cider-${{ matrix.target }}
          path: cider-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            cider-*.tar.gz

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Compute SHA256 sums
        id: sha
        run: |
          echo "aarch64=$(sha256sum cider-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(sha256sum cider-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          SHA_ARM64: ${{ steps.sha.outputs.aarch64 }}
          SHA_X86: ${{ steps.sha.outputs.x86_64 }}
        run: |
          VERSION="${TAG_NAME#v}"
          cat > cider.rb << FORMULA
          class Cider < Formula
            desc "Manage macOS Apple apps from the command line"
            homepage "https://github.com/thrashr888/cider"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/thrashr888/cider/releases/download/${TAG_NAME}/cider-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM64}"
              else
                url "https://github.com/thrashr888/cider/releases/download/${TAG_NAME}/cider-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86}"
              end
            end

            def install
              bin.install "cider"
            end

            test do
              assert_match "cider", shell_output("#{bin}/cider --help")
            end
          end
          FORMULA

          # Push formula to homebrew tap repo
          gh repo clone thrashr888/homebrew-cider /tmp/homebrew-cider 2>/dev/null || true
          if [ -d /tmp/homebrew-cider ]; then
            cp cider.rb /tmp/homebrew-cider/Formula/cider.rb
            cd /tmp/homebrew-cider
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Formula/cider.rb
            git commit -m "Update cider to ${TAG_NAME}" || true
            git push || echo "Homebrew tap push failed - create the repo first"
          else
            echo "homebrew-cider repo not found, skipping tap update"
            echo "Create it with: gh repo create thrashr888/homebrew-cider --public"
            echo "Formula content saved to cider.rb"
            cat cider.rb
          fi

  crates-io:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty || echo "Publish failed - check CARGO_REGISTRY_TOKEN secret"
