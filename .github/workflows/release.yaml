name: Release

on:
  push:
    tags: ["v*"]
  release:
    types: [created]

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cider-${{ matrix.target }}.tar.gz cider
      - uses: actions/upload-artifact@v4
        with:
          name: cider-${{ matrix.target }}
          path: cider-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            gh release upload "$TAG_NAME" cider-*.tar.gz --clobber
          else
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --generate-notes \
              cider-*.tar.gz
          fi

  crates-io:
    needs: build
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Compute SHA256 sums
        id: sha
        run: |
          echo "aarch64=$(sha256sum cider-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(sha256sum cider-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Generate and push Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name || github.ref_name }}
          SHA_ARM64: ${{ steps.sha.outputs.aarch64 }}
          SHA_X86: ${{ steps.sha.outputs.x86_64 }}
        run: |
          VERSION="${TAG_NAME#v}"

          cat > cider.rb << FORMULA
          class Cider < Formula
            desc "Manage macOS Apple apps from the command line"
            homepage "https://github.com/thrashr888/cider"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/thrashr888/cider/releases/download/${TAG_NAME}/cider-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM64}"
              else
                url "https://github.com/thrashr888/cider/releases/download/${TAG_NAME}/cider-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86}"
              end
            end

            def install
              bin.install "cider"
            end

            test do
              assert_match "cider", shell_output("#{bin}/cider --help")
            end
          end
          FORMULA

          git clone "https://x-access-token:${GH_TOKEN}@github.com/thrashr888/homebrew-cider.git" /tmp/homebrew-cider
          cp cider.rb /tmp/homebrew-cider/Formula/cider.rb
          cd /tmp/homebrew-cider
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cider.rb
          git commit -m "Update cider to ${TAG_NAME}"
          git push
