name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cider-${{ matrix.target }}.tar.gz cider
      - uses: actions/upload-artifact@v4
        with:
          name: cider-${{ matrix.target }}
          path: cider-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: cider-*.tar.gz

  crates-io:
    needs: build
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish || echo "Version already published — skipping"

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Compute SHA256 sums
        id: sha
        run: |
          echo "darwin_arm64=$(sha256sum cider-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum cider-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew formula
        uses: thrashr888/homebrew-tap@main
        with:
          formula: cider
          tag: ${{ github.ref_name }}
          tap-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          darwin-arm64-sha256: ${{ steps.sha.outputs.darwin_arm64 }}
          darwin-amd64-sha256: ${{ steps.sha.outputs.darwin_amd64 }}
          template: |
            class Cider < Formula
              desc "Manage macOS Apple apps from the command line"
              homepage "https://github.com/thrashr888/cider"
              version "${VERSION}"
              license "MIT"

              on_macos do
                if Hardware::CPU.arm?
                  url "https://github.com/thrashr888/cider/releases/download/${TAG}/cider-aarch64-apple-darwin.tar.gz"
                  sha256 "${SHA_DARWIN_ARM64}"
                else
                  url "https://github.com/thrashr888/cider/releases/download/${TAG}/cider-x86_64-apple-darwin.tar.gz"
                  sha256 "${SHA_DARWIN_AMD64}"
                end
              end

              def install
                bin.install "cider"
              end

              test do
                assert_match "cider", shell_output("#{bin}/cider --help")
              end
            end
